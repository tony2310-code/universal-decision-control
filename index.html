
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Behavior Loop Decoder</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    margin-top:0;
}

input, select{
    width:100%;
    padding:10px;
    margin-top:6px;
    margin-bottom:14px;
    background:#222;
    border:1px solid #444;
    color:white;
}

button{
    padding:10px 16px;
    margin-right:10px;
    background:#ffc94a;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

.card{
    background:#1b1b1b;
    padding:16px;
    margin-top:16px;
    border-radius:8px;
}

.loop{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:12px;
}

.loop div{
    flex:1;
    background:#222;
    padding:10px;
    border-radius:6px;
    text-align:center;
}

.red{background:#5c1f1f}
.green{background:#1f5c2e}
.yellow{background:#5c521f}

.small{
    font-size:13px;
    opacity:.7;
}
</style>
</head>

<body>

<div class="container">

<h1>Behavior Loop Decoder</h1>
<p class="small">Use short phrases (1–3 words).</p>

<label>Date and time</label>
<input id="dt" type="datetime-local">

<h3>Decode What Happened</h3>

<label>Situation</label>
<input id="situation" placeholder="example: no replies">

<label>Thought</label>
<input id="thought" placeholder="example: nobody interested">

<label>Emotion</label>
<select id="emotion">
<option>Hopeless</option>
<option>Frustrated</option>
<option>Anxious</option>
<option>Overwhelmed</option>
<option>Calm</option>
<option>Confident</option>
<option>Motivated</option>
<option>Other</option>
</select>

<label>Emotion Intensity (0-10)</label>
<input id="intensity" type="number" min="0" max="10">

<label>Action</label>
<input id="action" placeholder="example: stopped posting">

<label>Result</label>
<input id="result" placeholder="example: no progress">

<h3>Correction</h3>

<label>Corrective Action</label>
<input id="fix" placeholder="example: post again">

<label>Action Deadline</label>
<input id="deadline" type="datetime-local">

<button onclick="decode()">Decode + Save</button>
<button onclick="copySummary()">Copy Insight</button>
<button onclick="exportJSON()">Export JSON</button>
<button onclick="exportCSV()">Export CSV</button>
<input type="file" onchange="importJSON(event)">

<div id="summary" class="card"></div>

<div id="visualLoop" class="loop"></div>

<div id="patterns" class="card"></div>

<div class="card">
<h3>History</h3>
<div id="history"></div>
</div>

</div>

<script>

function getEmotionClass(emotion){

emotion = emotion.toLowerCase()

if(["hopeless","frustrated","anxious","overwhelmed"].includes(emotion)) return "red"
if(["calm","confident","motivated"].includes(emotion)) return "green"

return "yellow"

}

function decode(){

let dt = document.getElementById("dt").value || new Date().toISOString().slice(0,16)
let situation = document.getElementById("situation").value
let thought = document.getElementById("thought").value
let emotion = document.getElementById("emotion").value
let intensity = document.getElementById("intensity").value
let action = document.getElementById("action").value
let result = document.getElementById("result").value
let fix = document.getElementById("fix").value
let deadline = document.getElementById("deadline").value

let sentence1 = `You thought "${thought}", which made you feel "${emotion}". Because of that you "${action}", which resulted in "${result}".`
let sentence2 = ""

if(fix){
sentence2 = `To correct this loop you will "${fix}" by ${deadline || "the time you decide"}.`
}

document.getElementById("summary").innerHTML=`
<h3>Insight</h3>
<p>${sentence1}</p>
<p>${sentence2}</p>
`

document.getElementById("visualLoop").innerHTML=`
<div><b>Thought</b><br>${thought}</div>
<div class="${getEmotionClass(emotion)}"><b>Emotion</b><br>${emotion}</div>
<div><b>Action</b><br>${action}</div>
<div><b>Result</b><br>${result}</div>
`

let entry={
dt,
situation,
thought,
emotion,
intensity,
action,
result,
fix,
deadline,
sentence1,
sentence2
}

let data = JSON.parse(localStorage.getItem("decoderData") || "[]")
data.unshift(entry)

localStorage.setItem("decoderData", JSON.stringify(data))

renderHistory()
renderPatterns()

}

function renderHistory(){

let data = JSON.parse(localStorage.getItem("decoderData") || "[]")

let html=""

data.forEach(d=>{

html += `
<div style="border-bottom:1px solid #333;padding:8px 0;">
<b>${d.dt.replace("T"," ")}</b><br>
${d.sentence1}<br>
${d.sentence2}
</div>
`

})

document.getElementById("history").innerHTML = html

}

function renderPatterns(){

let data = JSON.parse(localStorage.getItem("decoderData") || "[]").slice(0,7)

let thoughts={}
let emotions={}
let actions={}

data.forEach(d=>{

thoughts[d.thought]=(thoughts[d.thought]||0)+1
emotions[d.emotion]=(emotions[d.emotion]||0)+1
actions[d.action]=(actions[d.action]||0)+1

})

function mostCommon(obj){

return Object.entries(obj).sort((a,b)=>b[1]-a[1])[0]?.[0] || "None yet"

}

document.getElementById("patterns").innerHTML=`
<h3>Recent Pattern (Last 7)</h3>
Thought: ${mostCommon(thoughts)}<br>
Emotion: ${mostCommon(emotions)}<br>
Action: ${mostCommon(actions)}
`

}

function copySummary(){

let text = document.getElementById("summary").innerText
navigator.clipboard.writeText(text)
alert("Insight copied")

}

function exportJSON(){

let data = localStorage.getItem("decoderData")
let blob = new Blob([data],{type:"application/json"})
let url = URL.createObjectURL(blob)

let a = document.createElement("a")
a.href = url
a.download = "decoder_backup.json"
a.click()

}

function exportCSV(){

let data = JSON.parse(localStorage.getItem("decoderData") || "[]")

let csv="dt,situation,thought,emotion,intensity,action,result,fix,deadline\n"

data.forEach(d=>{

csv+=`${d.dt},${d.situation},${d.thought},${d.emotion},${d.intensity},${d.action},${d.result},${d.fix},${d.deadline}\n`

})

let blob = new Blob([csv],{type:"text/csv"})
let url = URL.createObjectURL(blob)

let a = document.createElement("a")
a.href = url
a.download = "decoder_export.csv"
a.click()

}

function importJSON(event){

let file = event.target.files[0]
let reader = new FileReader()

reader.onload = function(e){

let imported = JSON.parse(e.target.result)
let current = JSON.parse(localStorage.getItem("decoderData") || "[]")

let merged = current.concat(imported)

localStorage.setItem("decoderData", JSON.stringify(merged))

renderHistory()
renderPatterns()

}

reader.readAsText(file)

}

document.getElementById("dt").value = new Date().toISOString().slice(0,16)

renderHistory()
renderPatterns()

</script>

</body>
</html>
